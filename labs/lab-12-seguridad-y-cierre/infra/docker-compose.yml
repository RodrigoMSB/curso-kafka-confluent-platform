# ============================================================
# NovaTech Logistics - Lab 12: Seguridad y evaluación final
# Stack: 3 brokers cp-kafka:8.2.0 con SASL_SSL + Kafbat UI + cliente CLI
#
# NOTA: este lab es el primero del curso con seguridad real (TLS + SASL + ACL).
# Decisiones pedagógicas (ver docs/notas-instructor.md):
# - SASL/PLAIN (no SCRAM): para didáctica del JAAS visible
# - TLS solo server-side (no mTLS): evita generar certs cliente
# - Inter-broker PLAINTEXT en red interna Docker: simplifica
# ============================================================

services:
  # ═══════════════════════════════════════════════════════════
  # 3 BROKERS Kafka 4.2 con SASL_SSL en listener cliente
  # ═══════════════════════════════════════════════════════════
  kafka-broker-1:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka-broker-1
    container_name: kafka-broker-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://kafka-broker-1:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka-broker-1:39092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-broker-1:29092,EXTERNAL://kafka-broker-1:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:SASL_SSL,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-broker-1:39092,2@kafka-broker-2:39093,3@kafka-broker-3:39094"
      # SASL config
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/jaas/kafka_server_jaas.conf"
      # SSL config
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka-broker-1.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: changeit
      KAFKA_SSL_KEY_PASSWORD: changeit
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: changeit
      KAFKA_SSL_CLIENT_AUTH: "none"
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      # Authorizer KRaft
      KAFKA_AUTHORIZER_CLASS_NAME: "org.apache.kafka.metadata.authorizer.StandardAuthorizer"
      KAFKA_SUPER_USERS: "User:admin;User:ANONYMOUS"
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      # Replication
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "novatech-lab12-cluster"
    volumes:
      - ./certs:/etc/kafka/secrets
      - ./jaas/kafka_server_jaas.conf:/etc/kafka/jaas/kafka_server_jaas.conf:ro
      - kafka-broker-1-data:/var/lib/kafka/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3</dev/tcp/kafka-broker-1/29092' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  kafka-broker-2:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka-broker-2
    container_name: kafka-broker-2
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://kafka-broker-2:29093,EXTERNAL://0.0.0.0:9093,CONTROLLER://kafka-broker-2:39093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-broker-2:29093,EXTERNAL://kafka-broker-2:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:SASL_SSL,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-broker-1:39092,2@kafka-broker-2:39093,3@kafka-broker-3:39094"
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/jaas/kafka_server_jaas.conf"
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka-broker-2.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: changeit
      KAFKA_SSL_KEY_PASSWORD: changeit
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: changeit
      KAFKA_SSL_CLIENT_AUTH: "none"
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      KAFKA_AUTHORIZER_CLASS_NAME: "org.apache.kafka.metadata.authorizer.StandardAuthorizer"
      KAFKA_SUPER_USERS: "User:admin;User:ANONYMOUS"
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "novatech-lab12-cluster"
    volumes:
      - ./certs:/etc/kafka/secrets
      - ./jaas/kafka_server_jaas.conf:/etc/kafka/jaas/kafka_server_jaas.conf:ro
      - kafka-broker-2-data:/var/lib/kafka/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3</dev/tcp/kafka-broker-2/29093' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  kafka-broker-3:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka-broker-3
    container_name: kafka-broker-3
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://kafka-broker-3:29094,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka-broker-3:39094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-broker-3:29094,EXTERNAL://kafka-broker-3:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:SASL_SSL,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-broker-1:39092,2@kafka-broker-2:39093,3@kafka-broker-3:39094"
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/jaas/kafka_server_jaas.conf"
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka-broker-3.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: changeit
      KAFKA_SSL_KEY_PASSWORD: changeit
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: changeit
      KAFKA_SSL_CLIENT_AUTH: "none"
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      KAFKA_AUTHORIZER_CLASS_NAME: "org.apache.kafka.metadata.authorizer.StandardAuthorizer"
      KAFKA_SUPER_USERS: "User:admin;User:ANONYMOUS"
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "novatech-lab12-cluster"
    volumes:
      - ./certs:/etc/kafka/secrets
      - ./jaas/kafka_server_jaas.conf:/etc/kafka/jaas/kafka_server_jaas.conf:ro
      - kafka-broker-3-data:/var/lib/kafka/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3</dev/tcp/kafka-broker-3/29094' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ═══════════════════════════════════════════════════════════
  # KAFBAT UI - se conecta vía listener INTERNAL plaintext
  # (sin auth para Kafbat mismo; en producción se haría con SASL_SSL)
  # ═══════════════════════════════════════════════════════════
  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    hostname: kafbat-ui
    container_name: kafbat-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: novatech-lab12
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker-1:29092,kafka-broker-2:29093,kafka-broker-3:29094
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # CLI CLIENT - contenedor "shell" para ejecutar kafka-* comandos
  # con --command-config apuntando a client-properties/
  # ═══════════════════════════════════════════════════════════
  cli-client:
    image: confluentinc/cp-kafka:8.2.0
    hostname: cli-client
    container_name: cli-client
    depends_on:
      kafka-broker-1:
        condition: service_healthy
    volumes:
      - ./certs:/etc/kafka/secrets
      - ./client-properties:/etc/kafka/client-properties:ro
    command: tail -f /dev/null
    networks:
      - default

volumes:
  kafka-broker-1-data:
  kafka-broker-2-data:
  kafka-broker-3-data:

networks:
  default:
    name: novatech-lab12-net
    driver: bridge
