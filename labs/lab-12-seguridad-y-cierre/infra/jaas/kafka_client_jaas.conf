// Archivo de referencia educativa.
// Los CLI modernos (kafka-topics, kafka-console-producer, etc.) NO usan este archivo;
// usan --command-config / --producer.config / --consumer.config con properties files
// (ver infra/client-properties/admin.properties, app1.properties, app2.properties).
//
// Si necesitaras conectar un cliente Java legacy con JAAS, este sería su contenido:

KafkaClient {
    org.apache.kafka.common.security.plain.PlainLoginModule required
    username="admin"
    password="admin-secret";
};
